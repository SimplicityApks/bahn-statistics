name: Scrape & Publish

on:
  schedule:
    # Active windows are 06:45–10:30 and 16:45–20:30 LOCAL (CET/CEST).
    # In UTC that is 04:45–09:30 (CEST) or 05:45–10:30 (CET) for morning,
    # and 14:45–19:30 (CEST) or 15:45–20:30 (CET) for evening.
    # Cover both seasons by firing during 04–09 UTC and 14–19 UTC (every 15 min).
    # GitHub Actions cron can be delayed 5–30 min, so a missed fire near the end
    # is still fine — scrape_once does a full-window scan in one cycle.
    - cron: '*/15 4-9,14-19 * * *'
  workflow_dispatch:  # allow manual trigger from the Actions tab

# Only one run at a time; new runs wait rather than cancel in-flight ones
# (avoids races where two runners check out the same DB version)
concurrency:
  group: scrape-publish
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit bahn.db + docs/ back to the repo

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape (single cycle)
        run: python3 main.py scrape --once

      - name: Export static site
        run: python3 export.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bahn.db docs/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "chore: scrape $(date -u '+%Y-%m-%dT%H:%MZ')"
          # Pull with rebase to handle concurrent runs committing ahead of us
          git pull --rebase origin main
          git push origin main
